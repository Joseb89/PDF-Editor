<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Rotator</title>
</head>
<body>
    <h1>Rotate PDF</h1>
    <form method="POST" action="/rotate_pdf" enctype="multipart/form-data">
        <input type="file" id="pdf_file" name="pdf_file" accept=".pdf" required>
        <label for="angle">Select rotation angle:</label>
        <select name="angle" id="angle">
            <option value="-90">-90</option>
            <option value="90">90</option>
            <option value="180">180</option>
        </select>
        <input type="submit">Rotate</button>
    </form>>  
</body>
</html>
